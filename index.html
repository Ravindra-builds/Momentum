<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <!-- PWA Primary Meta Tags -->
    <title>Momentum — Habit & Study Tracker</title>
    <meta name="description" content="Premium minimal consistency tracker for habits, study hours, and discipline." />
    <meta name="theme-color" content="#050505" />
    <meta name="background-color" content="#050505" />

    <!-- PWA Installability -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Momentum" />

    <!-- Apple / iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Momentum" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    <link rel="apple-touch-icon" sizes="512x512" href="/icons/icon-512x512.png" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
      *, *::before, *::after { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      html, body, #root { height: 100%; margin: 0; padding: 0; overflow: hidden; background: #050505; }
      ::-webkit-scrollbar { width: 0; height: 0; background: transparent; }

      /* ── Splash Screen ── */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; align-items: center; justify-content: center; flex-direction: column;
        background: #050505; color: #fff;
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        transition: opacity 0.3s ease;
      }
      #splash.out { opacity: 0; pointer-events: none; }

      #splash .logo {
        width: 68px; height: 68px; border-radius: 17px;
        background: linear-gradient(145deg, #16a34a, #22c55e);
        display: flex; align-items: center; justify-content: center;
        font-size: 30px; font-weight: 800; color: #050505;
        margin-bottom: 16px;
      }

      #splash h1 { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; margin: 0; color: #fafafa; }
      #splash .sub { font-size: 11px; color: #525252; margin-top: 5px; }

      /* 3-dot loading indicator */
      #splash .dots { display: flex; gap: 6px; margin-top: 28px; }
      #splash .dots span {
        width: 6px; height: 6px; border-radius: 50%; background: #22c55e;
        animation: dot-bounce 1.2s ease-in-out infinite;
      }
      #splash .dots span:nth-child(2) { animation-delay: 0.15s; }
      #splash .dots span:nth-child(3) { animation-delay: 0.3s; }
      @keyframes dot-bounce {
        0%, 80%, 100% { opacity: 0.2; transform: scale(0.8); }
        40% { opacity: 1; transform: scale(1.1); }
      }
    </style>
  </head>
  <body>
    <!-- Splash Screen with loading dots -->
    <div id="splash">
      <div class="logo">M</div>
      <h1>Momentum</h1>
      <p class="sub">Discipline · Consistency · Growth</p>
      <div class="dots"><span></span><span></span><span></span></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
